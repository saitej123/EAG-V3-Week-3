<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
  <defs>
    <!-- Deep futuristic dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- Cyan/Teal to Electric Blue frame -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Bright Neon Green to Cyan agent -->
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  
  <!-- Frame / Corners -->
  <g fill="none" stroke="url(#frameGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 34 34 V 54 M 34 34 H 54"/>
    <path d="M 94 34 V 54 M 94 34 H 74"/>
    <path d="M 34 94 V 74 M 34 94 H 54"/>
    <path d="M 94 94 V 74 M 94 94 H 74"/>
  </g>
  
  <!-- Agent icon/robot symbol -->
  <g fill="none" stroke="url(#agentGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Robot head -->
    <rect x="46" y="52" width="36" height="26" rx="6" />
    <!-- Eyes -->
    <circle cx="56" cy="63" r="2.5" fill="#34d399" stroke="none" />
    <circle cx="72" cy="63" r="2.5" fill="#34d399" stroke="none" />
    <!-- Antenna base & rod -->
    <path d="M 64 52 V 42" />
    <!-- Antenna bulb -->
    <circle cx="64" cy="38" r="3.5" fill="#38bdf8" stroke="none" />
  </g>
</svg>
